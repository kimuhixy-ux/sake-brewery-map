<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>全国酒蔵マップ</title>
<meta name="description" content="全国の酒蔵をOpenStreetMapのデータで探せるPWA。有名銘柄の解説付き。">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22334a">

<!-- iOS向け -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="酒蔵マップ">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="vendor/markercluster/MarkerCluster.css">
<link rel="stylesheet" href="vendor/markercluster/MarkerCluster.Default.css">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="app-header">
  <h1>全国酒蔵マップ</h1>
</header>

<div id="map"></div>

<button id="locate-btn" title="現在地に移動" aria-label="現在地に移動">📍</button>

<div id="control-panel">
  <div class="control-row">
    <input type="text" id="search-input" placeholder="蔵名・銘柄名で検索…" autocomplete="off">
  </div>
  <div class="control-row">
    <select id="pref-select">
      <option value="">都道府県: すべて</option>
    </select>
    <select id="category-select">
      <option value="">種別: すべて</option>
      <option value="sake">清酒</option>
      <option value="shochu">焼酎</option>
      <option value="awamori">泡盛</option>
      <option value="beer">地ビール</option>
    </select>
    <button id="featured-toggle" class="toggle-btn" aria-pressed="false">🏵 銘柄解説のある蔵のみ</button>
  </div>
  <div class="control-row" id="count-row">
    <span id="result-count"></span>
  </div>
</div>

<!-- Leaflet JS -->
<script src="vendor/leaflet/leaflet.js"></script>
<script src="vendor/markercluster/leaflet.markercluster.js"></script>

<script src="js/app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      // register()だけだと前回チェックから24時間以内は更新確認が走らないことがあるため、
      // ページを開くたびに明示的にupdate()を呼んで新しいsw.jsの有無を即確認する。
      reg.update();
    }).catch(console.error);
  });

  // 新しいService Workerが有効化された(=CACHE_NAMEが上がった)ら、
  // 表示中のページを1回だけ自動リロードして新しいキャッシュの内容を反映する。
  let refreshingAfterUpdate = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshingAfterUpdate) return;
    refreshingAfterUpdate = true;
    window.location.reload();
  });
}
</script>

</body>
</html>
